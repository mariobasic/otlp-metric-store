services:
  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    ports:
      - "9000:9000"   # native protocol (service default)
      - "8123:8123"   # HTTP interface (handy for ad-hoc queries)
    environment:
      CLICKHOUSE_PASSWORD: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "clickhouse", "--query", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  telemetrygen:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command:
      - metrics
      - --otlp-insecure
      - --otlp-endpoint=host.docker.internal:4317
      - --metric-type=Gauge
      - --metrics=20
      - --workers=2
      - --telemetry-attributes=env="local"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - send-metrics