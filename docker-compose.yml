services:
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --overprovisioned
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --node-id 0
      - --check=false
      - --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  clickhouse:
    image: clickhouse/clickhouse-server:26.2
    ports:
      - "9000:9000"   # native protocol (service default)
      - "8123:8123"   # HTTP interface (handy for ad-hoc queries)
    environment:
      CLICKHOUSE_PASSWORD: clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "clickhouse-client", "--password", "clickhouse", "--query", "SELECT 1"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 5s

  telemetrygen:
    image: ghcr.io/open-telemetry/opentelemetry-collector-contrib/telemetrygen:latest
    command:
      - metrics
      - --otlp-insecure
      - --otlp-endpoint=host.docker.internal:4317
      - --metric-type=Gauge
      - --metrics=20
      - --workers=2
      - --telemetry-attributes=env="local"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - send-metrics